version: "3.8"

services:
    app:
        profiles: ["dev"]
        build: .
        depends_on:
            - database
            - redis
        ports:
            - 3000:3000
        entrypoint: bash -c "npm run migrate && npm run start"
        environment:
            - REDIS_HOST=redis
            - REDIS_PORT=6379
    database:
        image: mongo:latest
        hostname: mongo
        restart: on-failure
        ports: 
          - 27017:27017
        volumes:
            - ./mongo_data:/data/db
        healthcheck:
            test: test $$(echo "rs.initiate().ok || rs.status().ok" | mongo -port 27017 --quiet) -eq 1
            interval: 10s
            start_period: 30s

    redis:
        image: redis:7-alpine
        hostname: redis
        restart: on-failure
        ports:
            - 6379:6379
        volumes:
            - ./redis_data:/dataf
        command: redis-server --appendonly yes
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 3

    localstack:
        image: localstack/localstack:latest
        container_name: localstack
        ports:
            - "4566:4566"
        environment:
            - SERVICES=s3
            - DEBUG=1
            - AWS_ACCESS_KEY_ID=test
            - AWS_SECRET_ACCESS_KEY=test
            - DEFAULT_REGION=us-east-1
        volumes:
            - ./localstack:/var/lib/localstack
            - /var/run/docker.sock:/var/run/docker.sock